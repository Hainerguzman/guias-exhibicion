<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Guías de Exhibición — Jamar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--red:#C8102E;--dark:#1A1A2E;--border:#E0E0E0;--shadow:0 2px 8px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F2F5;color:var(--dark);min-height:100vh}
header{background:var(--red);color:#fff;padding:0 24px;display:flex;align-items:center;gap:16px;height:64px;box-shadow:var(--shadow);flex-wrap:wrap}
.logo{font-size:26px;font-weight:900;letter-spacing:-1px;white-space:nowrap}
.htitle{font-size:14px;opacity:.88;flex:1}
.bulk-btns{display:flex;gap:8px}
.bulk-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.45);color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;transition:background .2s}
.bulk-btn:hover{background:rgba(255,255,255,.32)}
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sw{position:relative;flex:1;min-width:180px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#999;pointer-events:none}
.sw input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--red)}
.fbtns{display:flex;gap:6px}
.fb{padding:7px 16px;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:700;color:#555;transition:all .2s}
.fb.active,.fb:hover{background:var(--red);border-color:var(--red);color:#fff}
.cbadge{background:#F5F5F5;color:#666;font-size:12px;padding:4px 10px;border-radius:20px;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;padding:20px 24px}
.card{background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:0 6px 20px rgba(0,0,0,.14);transform:translateY(-2px)}
.ch{background:var(--red);padding:12px 14px;display:flex;align-items:center;gap:10px}
.ccode{font-size:19px;font-weight:900;color:#fff;min-width:58px}
.cname{font-size:11.5px;color:rgba(255,255,255,.9);line-height:1.35;flex:1}
.cb{padding:10px 14px;flex:1}
.cimg-row{display:flex;gap:6px;overflow-x:auto;padding:8px 14px 4px;scrollbar-width:thin}
.cimg-row img{width:64px;height:64px;object-fit:contain;border-radius:6px;border:1px solid var(--border);background:#fafafa;flex-shrink:0}
.cimg-row img.placeholder{display:flex;align-items:center;justify-content:center;background:#f5f5f5}
.meta{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;background:#F5F5F5;padding:3px 9px;border-radius:20px}
.cf{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:#FAFAFA}
.dlbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 6px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:filter .2s}
.dlbtn:hover{filter:brightness(.9)}
.dlbtn.pdf{background:#FFEBEE;color:var(--red)}
.dlbtn.xl{background:#E8F5E9;color:#2E7D32}
.dlbtn.view{background:#E3F2FD;color:#1565C0}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#aaa}
.loading{grid-column:1/-1;text-align:center;padding:60px 20px;color:#aaa;font-size:16px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:90%;max-width:700px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mhead{background:var(--red);padding:16px 20px;border-radius:16px 16px 0 0;display:flex;align-items:center;gap:12px}
.mcode{font-size:22px;font-weight:900;color:#fff}
.mname{font-size:13px;color:rgba(255,255,255,.9);flex:1}
.mclose{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
.mbody{overflow-y:auto;padding:16px 20px;flex:1}
.piso-title{font-size:11px;font-weight:700;color:#fff;background:var(--dark);padding:5px 10px;border-radius:6px;margin:10px 0 6px;display:inline-block;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
th{background:#F5F5F5;font-weight:700;padding:7px 8px;text-align:left;border-bottom:2px solid var(--dark);font-size:11px}
td{padding:6px 8px;border-bottom:1px solid #EEE;vertical-align:middle}
tr:nth-child(even){background:#FAFAFA}
td:last-child,td:nth-child(3){text-align:center}
.prod-img{width:44px;height:44px;object-fit:contain;border-radius:4px;border:1px solid #eee;background:#fafafa;display:block}
.mfooter{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:#FAFAFA;border-radius:0 0 16px 16px}
.mfooter .dlbtn{font-size:13px;padding:10px}
footer{text-align:center;padding:20px;font-size:11px;color:#aaa;border-top:1px solid var(--border);background:#fff;margin-top:8px}
.progress-bar{display:none;position:fixed;top:0;left:0;right:0;height:3px;background:#FFCDD2;z-index:9999}
.progress-fill{height:100%;background:var(--red);width:0%;transition:width .1s}
</style>
</head>
<body><style>
#login-overlay{position:fixed;inset:0;background:#F0F2F5;z-index:99999;display:flex;align-items:center;justify-content:center}
#login-overlay.hidden{display:none}
.login-box{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.14);padding:40px 36px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:20px}
.login-logo{font-size:32px;font-weight:900;letter-spacing:-1px;color:#C8102E}
.login-subtitle{font-size:13px;color:#666;margin-top:-12px;text-align:center}
.login-box input{width:100%;padding:11px 14px;border:1.5px solid #E0E0E0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.login-box input:focus{border-color:#C8102E}
.login-btn{width:100%;padding:12px;background:#C8102E;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:filter .2s;font-family:inherit}
.login-btn:hover{filter:brightness(.9)}
.login-error{color:#C8102E;font-size:12px;text-align:center;min-height:16px}
.login-footer{font-size:11px;color:#aaa;text-align:center;margin-top:4px}
</style>
<div id="login-overlay"><div class="login-box">
  <div class="login-logo">JAMAR</div>
  <div class="login-subtitle">Guias de Exhibicion<br>Acceso restringido</div>
  <input type="text" id="login-user" placeholder="Usuario" autocomplete="username"/>
  <input type="password" id="login-pass" placeholder="Contrasena" autocomplete="current-password"/>
  <div class="login-error" id="login-error"></div>
  <button class="login-btn" id="login-btn">Ingresar</button>
  <div class="login-footer">Solo personal autorizado Jamar</div>
</div></div>
<script>(function(){
  var K='jm_auth_ok';
  if(sessionStorage.getItem(K)==='1'){document.getElementById('login-overlay').classList.add('hidden');}
  function go(){
    var u=document.getElementById('login-user').value.trim();
    var p=document.getElementById('login-pass').value;
    if(u==='CVISUALJAM'&&p==='Guias26**'){sessionStorage.setItem(K,'1');document.getElementById('login-overlay').classList.add('hidden');}
    else{document.getElementById('login-error').textContent='Usuario o contrasena incorrectos';document.getElementById('login-pass').value='';document.getElementById('login-pass').focus();}
  }
  document.getElementById('login-btn').addEventListener('click',go);
  document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  document.getElementById('login-user').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('login-pass').focus();});
})();</script>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<header>
  <div class="logo">JAMAR</div>
  <div class="htitle">Guías de Exhibición</div>
  <div class="bulk-btns">
    <button class="bulk-btn" onclick="downloadAllPDF()">&#8595; Todas en PDF</button>
    <button class="bulk-btn" onclick="downloadAllXLSX()">&#8595; Todas en Excel</button>
  </div>
</header>
<div class="toolbar">
  <div class="sw">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar por código o nombre…" oninput="render()"/>
  </div>
  <div class="fbtns">
    <button class="fb active" onclick="setFilter('all',this)">Todas</button>
    <button class="fb" onclick="setFilter('DOR',this)">Dormitorio</button>
    <button class="fb" onclick="setFilter('SOC',this)">Social</button>
  </div>
  <span class="cbadge" id="countBadge">Cargando…</span>
</div>
<div class="grid" id="grid"><div class="loading">Cargando guías…</div></div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="mhead">
      <div class="mcode" id="mcode"></div>
      <div class="mname" id="mname"></div>
      <button class="mclose" onclick="document.getElementById('overlay').classList.remove('open')">&times;</button>
    </div>
    <div class="mbody" id="mbody"></div>
    <div class="mfooter">
      <button class="dlbtn pdf" id="mPdfBtn">&#8595; Descargar PDF</button>
      <button class="dlbtn xl" id="mXlBtn">&#8595; Descargar Excel</button>
    </div>
  </div>
</div>
<footer>Jamar &nbsp;·&nbsp; Guías de Exhibición &nbsp;·&nbsp; <span id="year"></span></footer>
<script>
var GUIDES = [];
var activeFilter = 'all';
var currentGuide = null;

document.getElementById('year').textContent = new Date().getFullYear();

// Load data
fetch('guides.json?v=' + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(data){
    GUIDES = data;
    render();
  })
  .catch(function(err){
    document.getElementById('grid').innerHTML = '<div class="empty"><p>Error cargando datos: ' + err.message + '</p></div>';
    document.getElementById('countBadge').textContent = 'Error';
  });

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function render() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var grid = document.getElementById('grid');
  var vis = GUIDES.filter(function(g) {
    if (activeFilter !== 'all' && g.code.indexOf(activeFilter) !== 0) return false;
    if (q && g.code.toLowerCase().indexOf(q) === -1 && g.name.toLowerCase().indexOf(q) === -1) return false;
    return true;
  });
  document.getElementById('countBadge').textContent = vis.length + ' guía' + (vis.length !== 1 ? 's' : '');
  if (!vis.length) {
    grid.innerHTML = '<div class="empty"><p>No se encontraron guías</p></div>';
    return;
  }
  var cards = [];
  for (var i = 0; i < vis.length; i++) {
    var g = vis[i];
    var pisoKeys = Object.keys(g.pisos).sort();
    var ps = pisoKeys.map(function(p){ return 'Piso ' + p; }).join(' · ') || '—';
    var total = 0;
    pisoKeys.forEach(function(p){ total += g.pisos[p].length; });
    var code = g.code;
    // Collect up to 4 product images across all pisos
    var imgs = [];
    pisoKeys.forEach(function(p) {
      g.pisos[p].forEach(function(prod) { if (prod.img && imgs.length < 4) imgs.push(prod.img); });
    });
    var imgStrip = imgs.length
      ? '<div class="cimg-row">' + imgs.map(function(src) {
          return '<img src="' + src + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
        }).join('') + '</div>'
      : '';
    var card = '<div class="card">' +
      '<div class="ch"><div class="ccode">' + code + '</div><div class="cname">' + g.name + '</div></div>' +
      imgStrip +
      '<div class="cb"><div class="meta">' +
        '<div class="pill">&#9632; ' + total + ' productos</div>' +
        '<div class="pill">&#9776; ' + ps + '</div>' +
      '</div></div>' +
      '<div class="cf">' +
        '<button class="dlbtn pdf" data-code="' + code + '" data-action="pdf">&#8595; PDF</button>' +
        '<button class="dlbtn xl" data-code="' + code + '" data-action="xlsx">&#8595; Excel</button>' +
        '<button class="dlbtn view" data-code="' + code + '" data-action="view">&#128065; Ver</button>' +
      '</div></div>';
    cards.push(card);
  }
  grid.innerHTML = cards.join('');
  // Attach events via delegation
  grid.onclick = function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;
    var action = btn.dataset.action;
    var code = btn.dataset.code;
    if (action === 'pdf') genPDF(code);
    else if (action === 'xlsx') genXLSX(code);
    else if (action === 'view') openModal(code);
  };
}

function getGuide(code) {
  for (var i = 0; i < GUIDES.length; i++) {
    if (GUIDES[i].code === code) return GUIDES[i];
  }
  return null;
}

function openModal(code) {
  var g = getGuide(code);
  if (!g) return;
  currentGuide = g;
  document.getElementById('mcode').textContent = g.code;
  document.getElementById('mname').textContent = g.name;
  var html = '';
  var pisoKeys = Object.keys(g.pisos).sort();
  for (var i = 0; i < pisoKeys.length; i++) {
    var piso = pisoKeys[i];
    var prods = g.pisos[piso];
    html += '<div class="piso-title">PISO ' + piso + '</div>';
    html += '<table><thead><tr><th>Foto</th><th>Código</th><th>Producto</th><th>Cant.</th><th>OC</th></tr></thead><tbody>';
    prods.forEach(function(p){
      var imgCell = p.img
        ? '<img class="prod-img" src="' + p.img + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div style="width:44px;height:44px;background:#f5f5f5;border-radius:4px;border:1px solid #eee"></div>';
      html += '<tr><td>' + imgCell + '</td><td>' + p.c + '</td><td>' + p.n + '</td><td>' + p.q + '</td><td>' + p.o + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  document.getElementById('mbody').innerHTML = html;
  document.getElementById('mPdfBtn').onclick = function(){ genPDF(code); };
  document.getElementById('mXlBtn').onclick = function(){ genXLSX(code); };
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

// Pre-load product images as base64 data URLs
async function loadImgCache(prods) {
  var cache = {};
  await Promise.all(prods.filter(function(p){ return p.img; }).map(function(prod) {
    return fetch(prod.img, {mode:'cors'})
      .then(function(r){ return r.blob(); })
      .then(function(blob){
        return new Promise(function(resolve){
          var reader = new FileReader();
          reader.onload = function(e){ cache[prod.c] = e.target.result; resolve(); };
          reader.onerror = resolve;
          reader.readAsDataURL(blob);
        });
      })
      .catch(function(){});
  }));
  return cache;
}

async function buildPDF(g) {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({orientation:'p', unit:'mm', format:'a4'});
  var RED = [200,16,46], DARK = [26,26,46];
  var W = 210, MARGIN = 15, TW = W - 2*MARGIN;
  var IMG_COL = 16; // mm width for image column

  // Gather all products and pre-fetch their images
  var pisoKeys = Object.keys(g.pisos).sort();
  var allProds = [];
  pisoKeys.forEach(function(p){ allProds = allProds.concat(g.pisos[p]); });
  var imgCache = await loadImgCache(allProds);

  // Guide header
  doc.setFillColor(RED[0],RED[1],RED[2]);
  doc.roundedRect(MARGIN, 15, TW, 18, 3, 3, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text(g.code, MARGIN+4, 26.5);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text(g.name.toUpperCase(), MARGIN+44, 26.5);

  var y = 40;
  for (var i = 0; i < pisoKeys.length; i++) {
    var piso = pisoKeys[i];
    var prods = g.pisos[piso];
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFillColor(238,238,238);
    doc.rect(MARGIN, y, TW, 7, 'F');
    doc.setTextColor(DARK[0],DARK[1],DARK[2]);
    doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text('  PISO ' + piso, MARGIN+2, y+5);
    y += 9;
    (function(pisoProds, pisoImgCache, pisoDoc) {
      pisoDoc.autoTable({
        startY: y,
        margin: {left:MARGIN, right:MARGIN},
        head: [['', 'Código', 'Producto', 'Cant.', 'OC']],
        body: pisoProds.map(function(p){ return ['', p.c, p.n, p.q, p.o]; }),
        styles: {fontSize:8, cellPadding:2, overflow:'linebreak'},
        bodyStyles: {minCellHeight:IMG_COL},
        headStyles: {fillColor:DARK, textColor:[255,255,255], fontStyle:'bold', fontSize:7.5, minCellHeight:6},
        columnStyles: {
          0:{cellWidth:IMG_COL},
          1:{cellWidth:22},
          2:{cellWidth:TW-IMG_COL-22-14-14},
          3:{cellWidth:14, halign:'center'},
          4:{cellWidth:14, halign:'center'}
        },
        alternateRowStyles: {fillColor:[250,250,250]},
        didDrawCell: function(data) {
          if (data.column.index === 0 && data.section === 'body') {
            var prod = pisoProds[data.row.index];
            var imgData = prod && pisoImgCache[prod.c];
            if (imgData) {
              var pad = 1.5;
              var sz = data.cell.height - pad*2;
              try { pisoDoc.addImage(imgData, 'JPEG', data.cell.x+pad, data.cell.y+pad, sz, sz); } catch(e){}
            }
          }
        },
        didDrawPage: function(data) {
          pisoDoc.setFontSize(7); pisoDoc.setTextColor(150,150,150);
          pisoDoc.text('JAMAR — Guías de Exhibición', MARGIN, 290);
          pisoDoc.text('Pág. ' + pisoDoc.internal.getCurrentPageInfo().pageNumber, W-MARGIN, 290, {align:'right'});
        }
      });
    })(prods, imgCache, doc);
    y = doc.lastAutoTable.finalY + 8;
  }
  return doc;
}

async function genPDF(code) {
  var g = getGuide(code);
  if (!g) return;
  // Show loading state on buttons
  var cardBtn = document.querySelector('[data-code="'+code+'"][data-action="pdf"]');
  var mBtn = document.getElementById('mPdfBtn');
  var origCard = cardBtn ? cardBtn.innerHTML : null;
  if (cardBtn) { cardBtn.innerHTML = 'Generando…'; cardBtn.disabled = true; }
  if (mBtn) { mBtn.innerHTML = 'Generando…'; mBtn.disabled = true; }
  try {
    var doc = await buildPDF(g);
    doc.save(code + '_' + g.name.replace(/[^a-zA-Z0-9]/g,'_') + '.pdf');
  } catch(e) { console.error(e); }
  if (cardBtn) { cardBtn.innerHTML = origCard; cardBtn.disabled = false; }
  if (mBtn) { mBtn.innerHTML = '&#8595; Descargar PDF'; mBtn.disabled = false; }
}

function genXLSX(code) {
  var g = getGuide(code);
  if (!g) return;
  var wb = XLSX.utils.book_new();
  var rows = [[g.code + ' — ' + g.name]];
  var pisoKeys = Object.keys(g.pisos).sort();
  pisoKeys.forEach(function(piso) {
    rows.push(['PISO ' + piso], ['Código','Producto','Cantidad','OC']);
    g.pisos[piso].forEach(function(p){ rows.push([p.c, p.n, p.q, p.o]); });
    rows.push([]);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:14},{wch:55},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, code);
  XLSX.writeFile(wb, code + '_' + g.name.replace(/[^a-zA-Z0-9]/g,'_') + '.xlsx');
}

async function downloadAllPDF() {
  var bar = document.getElementById('progressBar');
  var fill = document.getElementById('progressFill');
  bar.style.display = 'block';
  var jsPDF = window.jspdf.jsPDF;
  var RED = [200,16,46], DARK = [26,26,46];
  var W = 210, MARGIN = 15, TW = W - 2*MARGIN;
  var IMG_COL = 16;
  var master = new jsPDF({orientation:'p', unit:'mm', format:'a4'});
  var firstGuide = true;
  for (var i = 0; i < GUIDES.length; i++) {
    var g = GUIDES[i];
    fill.style.width = ((i/GUIDES.length)*100) + '%';
    // Pre-fetch images for this guide
    var allProds = [];
    var pisoKeys = Object.keys(g.pisos).sort();
    pisoKeys.forEach(function(pk){ allProds = allProds.concat(g.pisos[pk]); });
    var imgCache = await loadImgCache(allProds);
    if (!firstGuide) master.addPage();
    firstGuide = false;
    master.setFillColor(RED[0],RED[1],RED[2]);
    master.roundedRect(MARGIN, 15, TW, 18, 3, 3, 'F');
    master.setTextColor(255,255,255);
    master.setFontSize(16); master.setFont('helvetica','bold');
    master.text(g.code, MARGIN+4, 26.5);
    master.setFontSize(11); master.setFont('helvetica','normal');
    master.text(g.name.toUpperCase(), MARGIN+44, 26.5);
    var y = 40;
    for (var j = 0; j < pisoKeys.length; j++) {
      var piso = pisoKeys[j];
      var prods = g.pisos[piso];
      if (y > 260) { master.addPage(); y = 20; }
      master.setFillColor(238,238,238);
      master.rect(MARGIN, y, TW, 7, 'F');
      master.setTextColor(DARK[0],DARK[1],DARK[2]);
      master.setFontSize(9); master.setFont('helvetica','bold');
      master.text('  PISO ' + piso, MARGIN+2, y+5);
      y += 9;
      (function(pisoProds, pisoCache, masterDoc) {
        masterDoc.autoTable({
          startY: y, margin:{left:MARGIN,right:MARGIN},
          head:[['', 'Código','Producto','Cant.','OC']],
          body:pisoProds.map(function(p){ return ['',p.c,p.n,p.q,p.o]; }),
          styles:{fontSize:8,cellPadding:2,overflow:'linebreak'},
          bodyStyles:{minCellHeight:IMG_COL},
          headStyles:{fillColor:DARK,textColor:[255,255,255],fontStyle:'bold',fontSize:7.5,minCellHeight:6},
          columnStyles:{0:{cellWidth:IMG_COL},1:{cellWidth:22},2:{cellWidth:TW-IMG_COL-22-14-14},3:{cellWidth:14,halign:'center'},4:{cellWidth:14,halign:'center'}},
          alternateRowStyles:{fillColor:[250,250,250]},
          didDrawCell:function(data){
            if(data.column.index===0 && data.section==='body'){
              var prod=pisoProds[data.row.index];
              var imgData=prod && pisoCache[prod.c];
              if(imgData){var pad=1.5,sz=data.cell.height-pad*2;try{masterDoc.addImage(imgData,'JPEG',data.cell.x+pad,data.cell.y+pad,sz,sz);}catch(e){}}
            }
          },
          didDrawPage:function(data){
            masterDoc.setFontSize(7);masterDoc.setTextColor(150,150,150);
            masterDoc.text('JAMAR — Guías de Exhibición',MARGIN,290);
            masterDoc.text('Pág. '+masterDoc.internal.getCurrentPageInfo().pageNumber,W-MARGIN,290,{align:'right'});
          }
        });
      })(prods, imgCache, master);
      y = master.lastAutoTable.finalY + 8;
    }
    await new Promise(function(r){ setTimeout(r, 5); });
  }
  fill.style.width = '100%';
  master.save('Guias_Exhibicion_Jamar_Completo.pdf');
  setTimeout(function(){ bar.style.display='none'; fill.style.width='0%'; }, 1000);
}

function downloadAllXLSX() {
  var wb = XLSX.utils.book_new();
  var summaryRows = [['Código','Nombre','Pisos','Total Productos']];
  GUIDES.forEach(function(g) {
    var total = Object.values(g.pisos).reduce(function(s,a){ return s+a.length; }, 0);
    summaryRows.push([g.code, g.name, Object.keys(g.pisos).join(', '), total]);
  });
  var wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
  wsSummary['!cols'] = [{wch:10},{wch:35},{wch:12},{wch:16}];
  XLSX.utils.book_append_sheet(wb, wsSummary, 'Resumen');
  GUIDES.forEach(function(g) {
    var rows = [[g.code + ' — ' + g.name]];
    Object.keys(g.pisos).sort().forEach(function(piso) {
      rows.push(['PISO '+piso], ['Código','Producto','Cantidad','OC']);
      g.pisos[piso].forEach(function(p){ rows.push([p.c,p.n,p.q,p.o]); });
      rows.push([]);
    });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:14},{wch:50},{wch:12},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, g.code.substring(0,31));
  });
  XLSX.writeFile(wb, 'Guias_Exhibicion_Jamar_Completo.xlsx');
}
