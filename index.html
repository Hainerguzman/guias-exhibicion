:root{--red:#C8102E;--dark:#1A1A2E;--border:#E0E0E0;--shadow:0 2px 8px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F2F5;color:var(--dark);min-height:100vh}

header{background:var(--red);color:#fff;padding:0 24px;display:flex;align-items:center;gap:16px;height:64px;box-shadow:var(--shadow);flex-wrap:wrap}
.logo{font-size:26px;font-weight:900;letter-spacing:-1px;white-space:nowrap}
.htitle{font-size:14px;opacity:.88;flex:1}
.bulk-btns{display:flex;gap:8px}
.bulk-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.45);color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;transition:background .2s}
.bulk-btn:hover{background:rgba(255,255,255,.32)}

.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sw{position:relative;flex:1;min-width:180px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#999;pointer-events:none}
.sw input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--red)}
.fbtns{display:flex;gap:6px}
.fb{padding:7px 16px;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:700;color:#555;transition:all .2s}

.card:hover{box-shadow:0 6px 20px rgba(0,0,0,.14);transform:translateY(-2px)}
.ch{background:var(--red);padding:12px 14px;display:flex;align-items:center;gap:10px}
.ccode{font-size:19px;font-weight:900;color:#fff;min-width:58px}
.cname{font-size:11.5px;color:rgba(255,255,255,.9);line-height:1.35;flex:1}
.cb{padding:10px 14px;flex:1}
.meta{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;background:#F5F5F5;padding:3px 9px;border-radius:20px}
.cf{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:#FAFAFA}
.dlbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 6px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:filter .2s}
.dlbtn:hover{filter:brightness(.9)}
.dlbtn.pdf{background:#FFEBEE;color:var(--red)}
.dlbtn.xl{background:#E8F5E9;color:#2E7D32}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#aaa}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:90%;max-width:700px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mhead{background:var(--red);padding:16px 20px;border-radius:16px 16px 0 0;display:flex;align-items:center;gap:12px}
.mcode{font-size:22px;font-weight:900;color:#fff}
.mname{font-size:13px;color:rgba(255,255,255,.9);flex:1}
.mclose{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
.mbody{overflow-y:auto;padding:16px 20px;flex:1}
.piso-title{font-size:11px;font-weight:700;color:#fff;background:var(--dark);padding:5px 10px;border-radius:6px;margin:10px 0 6px;display:inline-block;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
th{background:#F5F5F5;font-weight:700;padding:7px 8px;text-align:left;border-bottom:2px solid var(--dark);font-size:11px}
td{padding:6px 8px;border-bottom:1px solid #EEE}
tr:nth-child(even){background:#FAFAFA}
td:last-child,td:nth-child(3){text-align:center}
.mfooter{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:#FAFAFA;border-radius:0 0 16px 16px}
.mfooter .dlbtn{font-size:13px;padding:10px}

footer{text-align:center;padding:20px;font-size:11px;color:#aaa;border-top:1px solid var(--border);background:#fff;margin-top:8px}

.progress-bar{display:none;position:fixed;top:0;left:0;right:0;height:3px;background:#FFCDD2;z-index:9999}
.progress-fill{height:100%;background:var(--red);width:0%;transition:width .1s}
</style>
</head>

      </div>
      <div class="cb">
        <div class="meta">
          <div class="pill">&#9632; ${total} productos</div>
          <div class="pill">&#9776; ${ps}</div>
        </div>
      </div>
      <div class="cf">
        <button class="dlbtn pdf" onclick="genPDF('${g.code}')">&#8595; PDF</button>
        <button class="dlbtn xl" onclick="genXLSX('${g.code}')">&#8595; Excel</button>

}

function getGuide(code){ return GUIDES.find(g=>g.code===code); }

// ââ MODAL âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function openModal(code){
  const g=getGuide(code);
  if(!g)return;
  currentGuide=g;
  document.getElementById('mcode').textContent=g.code;
  document.getElementById('mname').textContent=g.name;
  let html='';
  for(const piso of Object.keys(g.pisos).sort()){
    const prods=g.pisos[piso];
    html+=`<div class="piso-title">PISO ${piso}</div>
    <table><thead><tr><th>CÃģdigo</th><th>Producto</th><th>Cant.</th><th>OC</th></tr></thead><tbody>`;
    prods.forEach(p=>{html+=`<tr><td>${p.c}</td><td>${p.n}</td><td>${p.q}</td><td>${p.o}</td></tr>`;});
    html+='</tbody></table>';
  }
  document.getElementById('mbody').innerHTML=html;
  document.getElementById('mPdfBtn').onclick=()=>genPDF(code);
  document.getElementById('mXlBtn').onclick=()=>genXLSX(code);
  document.getElementById('overlay').classList.add('open');
}
function closeModal(e){ if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); }

// ââ PDF GENERATION ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function buildPDF(g){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  const RED=[200,16,46], DARK=[26,26,46];
  const W=210, MARGIN=15, TW=W-2*MARGIN;

  // Header bar
  doc.setFillColor(...RED);
  doc.roundedRect(MARGIN,15,TW,18,3,3,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text(g.code, MARGIN+4, 26.5);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text(g.name.toUpperCase(), MARGIN+4+30, 26.5);

  let y=40;
  for(const piso of Object.keys(g.pisos).sort()){
    const prods=g.pisos[piso];
    if(y>260){ doc.addPage(); y=20; }

    doc.setFillColor(238,238,238);

    doc.setTextColor(...DARK); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text('  PISO '+piso, MARGIN+2, y+5);
    y
+=9;
    // Table
    doc.autoTable({
      startY: y,
      margin:{left:MARGIN,right:MARGIN},
      head: [['CÃģdigo','Producto','Cant.','OC['F],
      body: prods.map(p=>[p.c, p.n, p.q, p.o]),
      styles:{fontSize:8,cellPadding:2.5,overflow;'linebreak'},
      headStyles:{fillColor:DARK,textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},
      columnStyles:{0:{cellWidth:22},1:{cellWidth:TW-22-14-14},2:{cellWidth:14,halign:'center'},3:{cellWidth:14,halign:'center'}},
      alternateRowStyles:{fillColor:[250,250,250]},
      didDrawPage: (data)=>{
        // Footer
        doc.setFontSize(7); doc.setTextColor(150,150,150);
        doc.text('JAMAR â GuÃ­as de ExhibiciÃģn', MARGIN, 290);
        doc.text('PÃĄg. '+doc.internal.getCurrentPageInfo().pageNumber, W-MARGIN, 290, {align:'right'});
      }
    });
    y=doc.lastAutoTable.finalY+8;
  }
  return doc;
}

function genPDF(code){
  const g=getGuide(code);
  if(!g)return;
  const doc=buildPDF(g);
  doc.save(code+'_'+g.name.replace(/[^a-zA-Z0-9]/g,'_')+'.pdf');
}

// ââ EXCEL GENERATION ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function genXLSX(code){
  const g=getGuide(code);
  if(!g)return;
  const wb=XLSX.utils.book_new();
  const rows=[[g.code+' â '+g.name]];
  for(const piso of Object.keys(g.pisos).sort()){
    rows.push(['PISO '+piso],['CÃģdigo','Producto','Cantidad','OC']);
    g.pisos[piso].forEach(p=>rows.push([p.c,p.n,p.q,p.o]));
    rows.push([]);
  }
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:55},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,code);
  XLSX.writeFile(wb,code+'_'+g.name.replace(/[^a-zA-Z0-9]/g,'_')+'.xlsx');
}
