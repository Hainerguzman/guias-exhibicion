name: Sync Guias Exhibicion

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run sync script
        run: python3 sync_guias.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
